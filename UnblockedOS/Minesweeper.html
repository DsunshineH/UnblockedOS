<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullscreen Embed</title>
    <style>
        /* Entfernt alle Ränder, damit das Fenster wirklich Fullscreen ist */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe src="https://swordslasher.com/games/minesweeper/Mine.View.html?row=8&col=8&mine=10"></iframe>

</body>
</html>
