<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiele Vollbild</title>
    <style>
        /* Entfernt alle Standard-Ränder des Browsers */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Verhindert doppelte Scrollbalken */
            background-color: #000; /* Schwarzer Hintergrund für eventuelle Ladezeiten */
        }

        /* Lässt das iframe das komplette Fenster ausfüllen */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Das eingebettete Fenster im Vollbildmodus -->
    <iframe src="https://swordslasher.com/games/subway-surfers/game.html" 
            allow="fullscreen; autoplay; gamepad" 
            allowfullscreen>
    </iframe>

</body>
</html>
